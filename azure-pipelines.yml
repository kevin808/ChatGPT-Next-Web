# Node.js Express Web App to Linux on Azure
# Build a Node.js Express app and deploy it to Azure as a Linux web app.
# Add steps that analyze code, save build artifacts, deploy, and more:
# https://docs.microsoft.com/azure/devops/pipelines/languages/javascript

trigger:
- main

variables:

  # Azure Resource Manager connection created during pipeline creation
  azureSubscription: 'ec899757-0daa-4a40-a076-2f6b9cb01e00'

  # Web app name
  webAppName: 'kl-chatgpt'

  # Environment name
  environmentName: 'kl-chatgpt'

  # Agent VM image name
  vmImageName: 'ubuntu-latest'

stages:
- stage: Build
  displayName: Build stage
  jobs:
  - job: Build
    displayName: Build
    pool:
      vmImage: $(vmImageName)

    steps:
    - task: NodeTool@0
      inputs:
        versionSpec: '18.x'
      displayName: 'Install Node.js'

    - script: |
        npm install
        npm run build
      displayName: 'npm install, build and test'

    - task: CopyFiles@2
      inputs:
        SourceFolder: '$(System.DefaultWorkingDirectory)/node_modules'
        Contents: '**'
        TargetFolder: '$(Build.ArtifactStagingDirectory)/node_modules'
        CleanTargetFolder: true

    - task: CopyFiles@2
      inputs:
        SourceFolder: '$(System.DefaultWorkingDirectory)/.next'
        Contents: '**'
        TargetFolder: '$(Build.ArtifactStagingDirectory)/.next'
        CleanTargetFolder: false

    - task: CopyFiles@2
      inputs:
        SourceFolder: '$(System.DefaultWorkingDirectory)/public'
        Contents: '**'
        TargetFolder: '$(Build.ArtifactStagingDirectory)/public'
        CleanTargetFolder: false

    - task: CopyFiles@2
      inputs:
        SourceFolder: '$(System.DefaultWorkingDirectory)'
        Contents: 'package*.json'
        TargetFolder: '$(Build.ArtifactStagingDirectory)'
        CleanTargetFolder: false

    - task: CopyFiles@2
      inputs:
        SourceFolder: '$(System.DefaultWorkingDirectory)'
        Contents: 'next.config.js'
        TargetFolder: '$(Build.ArtifactStagingDirectory)'
        CleanTargetFolder: false

    - task: CopyFiles@2
      inputs:
        SourceFolder: '$(System.DefaultWorkingDirectory)'
        Contents: 'next-i18next.config.js'
        TargetFolder: '$(Build.ArtifactStagingDirectory)'
        CleanTargetFolder: false


    - task: ArchiveFiles@2
      displayName: 'Archive files'
      inputs:
        rootFolderOrFile: '$(Build.ArtifactStagingDirectory)'
        includeRootFolder: false
        archiveType: zip
        archiveFile: $(Build.ArtifactStagingDirectory)/$(Build.BuildId).zip
        replaceExistingArchive: true

    - upload: $(Build.ArtifactStagingDirectory)/$(Build.BuildId).zip
      artifact: drop
